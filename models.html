<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>All McLaren Models</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #000;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    .container {
      text-align: center;
      padding: 40px 20px;
      border-bottom: 1px solid #222;
      animation: fadeIn 1.2s ease-in-out;
    }

    h1 {
      font-size: 2.5em;
      color: #ff3c00;
      margin-bottom: 0.4em;
    }

    .car-image {
      width: 90%;
      max-width: 600px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(255, 60, 0, 0.4);
      transition: transform 0.4s ease;
    }

    .car-image:hover {
      transform: scale(1.05);
    }

    .details {
      margin-top: 20px;
    }

    .details h2 {
      font-size: 1.8em;
      border-bottom: 2px solid #ff0000;
      display: inline-block;
      padding-bottom: 6px;
    }

    .info {
      margin-top: 20px;
      display: none;
      padding: 10px 20px;
      font-size: 0.95rem;
      line-height: 1.6;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      background: rgba(255, 255, 255, 0.05);
      border-left: 3px solid #ff3c00;
      border-radius: 5px;
      animation: fadeIn 0.7s ease-in-out forwards;
    }

    button {
      margin-top: 20px;
      padding: 12px 24px;
      font-size: 16px;
      background-color: #ff3c00;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #ff1a00;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media screen and (max-width: 640px) {
      h1 {
        font-size: 1.8em;
      }

      button {
        width: 90%;
      }
    }
  </style>
</head>
<body>

  <!-- 🔰 McLaren 600LT Example -->
  <div class="container">
    <h1>McLaren 600LT</h1>
    <img src="https://tse1.mm.bing.net/th?id=OIP.edF0WuE0G9x4bOMn477_mAHaEK&pid=Api" alt="McLaren 600LT" class="car-image" />
    <div class="details">
      <h2>Specifications</h2>
      <p><strong>Performance:</strong> 592 hp</p>
      <p><strong>Engine:</strong> 3.8L V8 twin-turbocharged</p>
      <p><strong>0–60 mph:</strong> 2.9 sec</p>
    </div>
    <button onclick="toggleInfo('info600lt')">More Info</button>
    <div id="info600lt" class="info"></div>
  </div>

<div class="container">
  <h1>McLaren 540C</h1>
  <img
    src="https://images.hgmsites.net/hug/mclaren-540c_100547439_h.jpg"
    alt="McLaren 540C"
    class="car-image"
  />
  <div class="details">
    <h2>Specifications</h2>
    <p><strong>Performance:</strong> 533 hp</p>
    <p><strong>Engine:</strong> 3.8L V8 twin-turbocharged</p>
    <p><strong>0–60 mph:</strong> 3.5 sec</p>
    <p><strong>Top Speed:</strong> 199 mph</p>
  </div>
  <button onclick="toggleInfo('info540c')">More Info</button>
  <div id="info540c" class="info"></div>
</div>


  <!-- ⬇️ Add more models here by duplicating the container block -->

  <script>
    function toggleInfo(id) {
      const div = document.getElementById(id);
      const infoMap = {
        info600lt: `The McLaren 600LT is the longtail version of the 570S. It features a lighter body, enhanced downforce, top-exit exhausts, and delivers track-level performance on the road.`,
        // Add more entries like:
        // info540c: "The 540C is McLaren’s entry-level coupe with lightweight design...",
        // info720s: "The 720S is known for its aerodynamic shape and active rear wing...",
      };
      if (div.style.display === 'block') {
        div.style.display = 'none';
      } else {
        div.innerHTML = `<p>${infoMap[id]}</p>`;
        div.style.display = 'block';
      }
    }
const infoMap = {
  info600lt: `The McLaren 600LT is the longtail version of the 570S. It features a lighter body, enhanced downforce, top-exit exhausts, and delivers track-level performance on the road.`,
  info540c: `The McLaren 540C is part of McLaren’s Sports Series and is designed for daily usability while still delivering supercar performance. Its lightweight carbon-fiber construction and precise handling make it an ideal entry-level McLaren.`,
  // Add more entries here as you expand!
};

  </script>
</body>
</html>
