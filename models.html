
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>McLaren Supercars</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .container {
      text-align: center;
      padding: 40px 20px;
      border-bottom: 1px solid #222;
    }

    .car-image {
      width: 90%;
      max-width: 600px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(255, 60, 0, 0.4);
      transition: transform 0.3s ease;
    }

    .car-image:hover {
      transform: scale(1.05);
    }

    .model-title {
      font-size: 2rem;
      color: #ff3c00;
    }

    .details {
      margin-top: 20px;
    }

    .details h2 {
      font-size: 1.5rem;
      border-bottom: 2px solid #ff0000;
      display: inline-block;
      padding-bottom: 6px;
      margin-bottom: 10px;
    }

    .info {
      display: none;
      margin-top: 15px;
      padding: 10px;
      background-color: rgba(255, 255, 255, 0.05);
      border-left: 3px solid #ff3c00;
      border-radius: 4px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 1rem;
      background-color: #ff3c00;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #ff1a00;
    }
  </style>
</head>
<body>

  <div id="models-container"></div>

  <script>
    const models = [
      {
        name: "McLaren 540C",
        image: "https://images.hgmsites.net/hug/mclaren-540c_100547439_h.jpg",
        specs: {
          performance: "533 hp",
          engine: "3.8L twin-turbo V8",
          acceleration: "0–60 mph: 3.5 sec",
          topSpeed: "199 mph"
        },
        info: "Entry-level McLaren; part of the Sports Series. Lightweight and accessible."
      },
      {
        name: "McLaren 570S / 570GT",
        image: "https://hdqwalls.com/download/mclaren-570s-spider-2018-front-1920x1080.jpg",
        specs: {
          performance: "562 hp",
          engine: "3.8L twin-turbo V8",
          acceleration: "0–60 mph: 3.1 sec",
          topSpeed: "204 mph"
        },
        info: "Balanced everyday supercar. The GT offers more comfort and cargo space."
      },
      {
        name: "McLaren 600LT",
        image: "https://cdn.motor1.com/images/mgl/Bb7AK/s1/mclaren-600lt.jpg",
        specs: {
          performance: "592 hp",
          engine: "3.8L twin-turbo V8",
          acceleration: "0–60 mph: 2.9 sec",
          topSpeed: "204 mph"
        },
        info: "“Longtail” version of the 570S. Lighter, track-focused, with top-exit exhausts."
      },
      {
        name: "McLaren 620R",
        image: "https://files.porsche.com/filestore/image/multimedia/none/rd-2020-mclaren-620r/normal/fd103cf1-e243-11ea-80c9-005056bbdc38;sS;twebp/porsche-normal.webp",
        specs: {
          performance: "610 hp",
          engine: "3.8L twin-turbo V8",
          acceleration: "0–60 mph: 2.8 sec",
          topSpeed: "200+ mph"
        },
        info: "Road-legal version of McLaren’s 570S GT4 race car."
      },
      {
        name: "McLaren Solus GT",
        image: "https://cdn.motor1.com/images/mgl/n0r3kz/s1/mclaren-solus-gt.jpg",
        specs: {
          performance: "829 hp",
          engine: "5.2L naturally aspirated V10",
          acceleration: "0–60 mph: 2.5 sec",
          topSpeed: "200+ mph"
        },
        info: "Inspired by Gran Turismo video game concept. Track-only hypercar."
      }, 
  {
  name: "McLaren Artura",
  image: "https://www.autocar.co.uk/car-review/mclaren/artura",
  specs: {
    engine: "3.0L twin-turbo V6 + Electric Motor (Hybrid)",
    performance: "671 hp",
    acceleration: "0–60 mph: 3.0 sec",
    topSpeed: "205 mph"
  },
  info: "First series-production hybrid McLaren. New carbon-fiber platform."
},
{
  name: "McLaren P1",
  image: "https://www.hdcarwallpapers.com/2017_mclaren_p1_5th_anniversary_4k_2-wallpapers.html",
  specs: {
    engine: "3.8L twin-turbo V8 + Electric Motor (Hybrid)",
    performance: "903 hp",
    acceleration: "0–60 mph: 2.7 sec",
    topSpeed: "217 mph (electronically limited)"
  },
  info: "Part of the 'Holy Trinity' (with LaFerrari & Porsche 918). Limited to 375 units."
},
{
  name: "McLaren Speedtail",
  image: "https://cars.mclaren.com/us-en/models/ultimate-series/speedtail",
  specs: {
    engine: "4.0L twin-turbo V8 + Hybrid",
    performance: "1,035 hp",
    acceleration: "0–60 mph: ~2.5 sec",
    topSpeed: "250 mph"
  },
  info: "Successor to the F1 in spirit. Three-seat layout. Limited to 106 units."
},
{
  name: "McLaren Elva",
  image: "https://cars.mclaren.com/us-en/models/ultimate-series/elva",
  specs: {
    engine: "4.0L twin-turbo V8",
    performance: "804 hp",
    acceleration: "0–60 mph: 2.8 sec",
    topSpeed: "200+ mph"
  },
  info: "Roofless, windshield-less roadster. Ultra-lightweight. Limited production."
}

    ];

    $(document).ready(function () {
      models.forEach((model, index) => {
        const html = `
          <div class="container">
            <h1 class="model-title">${model.name}</h1>
            <img src="${model.image}" alt="${model.name}" class="car-image" />
            <div class="details">
              <h2>Specifications</h2>
              <p><strong>Performance:</strong> ${model.specs.performance}</p>
              <p><strong>Engine:</strong> ${model.specs.engine}</p>
              <p><strong>${model.specs.acceleration}</strong></p>
              <p><strong>Top Speed:</strong> ${model.specs.topSpeed}</p>
              <button class="info-btn" data-index="${index}">More Info</button>
              <div class="info" id="info-${index}">${model.info}</div>
            </div>
          </div>
        `;
        $("#models-container").append(html);
      });

      $(".info-btn").click(function () {
        const idx = $(this).data("index");
        $(`#info-${idx}`).slideToggle();
      });
    });
  </script>

</body>
</html>
